<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contact Medical Consultation</title>
<style>body{font-family:Inter;background:#f4f7fb;margin:0} form{background:white;padding:30px;border-radius:8px;max-width:600px;margin:40px auto} input,textarea,select{width:100%;padding:12px;margin-bottom:12px;border:1px solid #ccc;border-radius:6px}</style>
</head>
<body>
<form action="https://formsubmit.co/your@email.com" method="POST">
<h2>Submit Medical Case</h2>
<input type="text" name="name" placeholder="Full Name" required>
<select name="country">
<option>Country</option>
<option>UAE</option>
<option>Saudi Arabia</option>
<option>Oman</option>
<option>Nigeria</option>
<option>Kenya</option>
</select>
<textarea name="condition" placeholder="Medical condition"></textarea>
<input type="text" name="reports" placeholder="Link to medical reports">
<button type="submit">Submit Inquiry</button>
</form>
</body>
</html>
